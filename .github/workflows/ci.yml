name: CI

on:
  push:
    branches: [main, develop, 'claude/*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

  test:
    name: Test (Windows)
    # Real Windows instead of Linux+Wine: several thread-hijacking tests
    # (NThread's SuspendThread/GetThreadContext-based redirection) proved
    # deterministically broken specifically under GitHub Actions' Wine
    # emulation (CallTimeoutError, then a full process hang) while passing
    # cleanly both on real Windows hardware locally and here on a real
    # windows-latest runner -- Wine-emulation-specific, not a real bug. Also
    # drops the entire Wine/Xvfb/apt-cache/separate-Windows-bun-binary
    # download dance this job used to need in favor of just running bun.exe
    # natively via setup-bun.
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile --linker=hoisted

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun test --timeout 30000

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: bun audit
        continue-on-error: true
