name: Deploy documentation

on:
  push:
    branches:
      - main
      - feature/docs
      - 'docs/**'
      - 'feature/docs/**'
      - 'feature/docs-*'
    paths:
      - 'docs/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Every deployment updates the same gh-pages storage branch and the same Pages
# environment. Serialising them prevents two branch previews from overwriting
# each other's commit.
concurrency:
  group: documentation-pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.paths.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'

      - name: Resolve deployment paths
        id: paths
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          OWNER_NAME: ${{ github.repository_owner }}
        run: |
          if [[ "$BRANCH_NAME" == "main" ]]; then
            base_path="/$REPOSITORY_NAME/"
            destination=""
          else
            # Keep preview URLs flat and URL-safe. Git branch names cannot
            # contain spaces, but commonly contain `/` (for example docs/api).
            preview_slug="${BRANCH_NAME//\//-}"
            base_path="/$REPOSITORY_NAME/previews/$preview_slug/"
            destination="previews/$preview_slug"
          fi

          echo "base_path=$base_path" >> "$GITHUB_OUTPUT"
          echo "destination=$destination" >> "$GITHUB_OUTPUT"
          echo "preview_url=https://$OWNER_NAME.github.io$base_path" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build VitePress site
        env:
          DOCS_BASE: ${{ steps.paths.outputs.base_path }}
        run: bun run docs:build

      # The production build is written at the branch root. keep_files retains
      # all branch previews already stored below previews/.
      - name: Publish production site to storage branch
        if: github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/.vitepress/dist
          keep_files: true
          full_commit_message: 'docs: deploy production from ${{ github.sha }}'

      # destination_dir replaces only this branch's own folder and preserves
      # production plus every other branch preview.
      - name: Publish branch preview to storage branch
        if: github.ref_name != 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/.vitepress/dist
          destination_dir: ${{ steps.paths.outputs.destination }}
          full_commit_message: 'docs: deploy preview for ${{ github.ref_name }} at ${{ github.sha }}'

      # deploy-pages publishes one artifact at a time. The gh-pages branch is
      # used as persistent storage so the artifact contains production and all
      # branch preview paths together.
      - name: Check out complete Pages tree
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: published-pages

      - name: Upload complete Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: published-pages

      - name: Add preview URL to workflow summary
        env:
          PREVIEW_URL: ${{ steps.paths.outputs.preview_url }}
        run: |
          echo "Documentation URL: $PREVIEW_URL" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    environment:
      name: github-pages
      url: ${{ needs.build-and-publish.outputs.preview_url }}
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
