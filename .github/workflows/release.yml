name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      # changesets/action pushes commits/tags directly via git after a
      # successful `changeset publish`. Without this, that push runs
      # `.husky/pre-push` (typecheck + full Wine test suite), which this
      # bare Linux job never sets up Wine for -- it fails every Wine-
      # dependent test and aborts the push *after* npm publish already
      # succeeded, making a genuinely successful release look like a
      # failed run. CI (ci.yml) already covers testing before merge to
      # main; this job must not repeat it.
      HUSKY: '0'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.0'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure npm registry auth
        run: echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > ~/.npmrc

      # changesets/action does one of two things on every push to main:
      # - if any `.changeset/*.md` files are present, it opens/updates a
      #   "Version Packages" PR that runs the `version` script (bumps
      #   versions + changelogs + deletes the changesets).
      # - otherwise (i.e. that PR was just merged), it runs the `publish`
      #   script, which builds and runs `changeset publish`. That command
      #   publishes every package whose version isn't on npm yet, rewriting
      #   `workspace:*` ranges to real versions and publishing in dependency
      #   order automatically. The action then pushes a git tag per
      #   published package (`<name>@<version>`) and creates a matching
      #   GitHub Release from that package's changelog entry -- no manual
      #   tagging step needed.
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
